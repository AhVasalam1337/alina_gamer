<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pimple Popper - Surgery Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.2.4/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-filters@5.2.1/dist/pixi-filters.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #ffffff; }
        canvas { display: block; touch-action: none; opacity: 0; transition: opacity 0.3s; }
        #ui-layer { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 10; display: none; text-align: center; }
        #counter-layer { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10; font-family: 'Arial Black', sans-serif; font-size: 32px; color: #ff4444; text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff; pointer-events: none; text-align: center; }
        .btn { padding: 12px 20px; background: #888; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 2px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn.active { background: #ff4444; box-shadow: 0 0 15px rgba(255, 68, 68, 0.6); }
    </style>
</head>
<body>

<div id="counter-layer">ВЫДАВЛЕНО: <span id="pimpleCount">0</span></div>
<div id="ui-layer"></div>

<script>
    // Глобальные объекты PIXI
    const app = new PIXI.Application({
        width: window.innerWidth, height: window.innerHeight,
        backgroundColor: 0xffffff, antialias: true, resizeTo: window
    });
    document.body.appendChild(app.view);

    const faceLayer = new PIXI.Container();
    const pimpleLayer = new PIXI.Container();
    const vfxLayer = new PIXI.Container();
    const speechLayer = new PIXI.Container();
    app.stage.addChild(faceLayer, vfxLayer, speechLayer);
    speechLayer.eventMode = 'none';

    // Глобальные хранилища данных
    let tex = {}, spr = {}, videoPool = [], poolIdx = 0, poppedCount = 0;
    let audio = { ctx: null, buffer: null, source: null };
</script>

<script src="js/config.js"></script>
<script src="js/face.js"></script>
<script src="js/vfx.js"></script>
<script src="js/engine.js"></script>

<script>
    // Запуск только после загрузки всех скриптов
    window.onload = () => {
        if (typeof init === 'function') {
            init();
        } else {
            console.error("Engine.js не загружен или функция init не найдена");
        }
    };
</script>
</body>
</html>
