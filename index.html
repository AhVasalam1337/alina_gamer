<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pimple Popper - Pro Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.2.4/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-filters@5.2.1/dist/pixi-filters.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
	<script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #ffffff; }
        canvas { display: block; touch-action: none; opacity: 0; transition: opacity 0.3s; }
        #ui-layer { 
            position: absolute; 
            bottom: 40px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 10; 
            display: none;
        }
        #counter-layer { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 10; font-family: 'Arial Black', sans-serif; font-size: 32px; 
            color: #ff4444; text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff;
            pointer-events: none; text-align: center;
        }
        .btn {
            padding: 15px 35px; background: #ff4444; color: white; border: none;
            border-radius: 50px; cursor: pointer; font-family: sans-serif;
            font-weight: bold; box-shadow: 0 4px 15px rgba(255, 68, 68, 0.4);
            transition: transform 0.1s;
            white-space: nowrap;
        }
        .btn:active { transform: scale(0.92); }
    </style>
</head>
<body>

<div id="counter-layer">ВЫДАВЛЕНО: <span id="pimpleCount">0</span></div>

<div id="ui-layer">
    <button id="spawnBurstBtn" class="btn">БОЛЬШЕ ПРЫЩЕЙ</button>
</div>

<script>
    const CONFIG = {
        EYE_X: 135, EYE_Y: 80, OFFSET_X: 20, MOUTH_Y: 230,
        BODY_Y_FIXED: 200, 
        BODY_SCALE_V: 0.95, 
        BODY_SCALE_H: 1.05, 
        LIMIT_Y_TOP: 20, LIMIT_Y_BOT: 270,
        ZONE_A: 180, ZONE_B: 225, 
        VIDEO_URL: 'https://raw.githubusercontent.com/AhVasalam1337/tvar_blyat/main/main.webm'
    };

    const app = new PIXI.Application({
        width: window.innerWidth, height: window.innerHeight,
        backgroundColor: 0xffffff, antialias: true, resizeTo: window
    });
    document.body.appendChild(app.view);

    const faceLayer = new PIXI.Container();
    const pimpleLayer = new PIXI.Container();
    const vfxLayer = new PIXI.Container();
    const speechLayer = new PIXI.Container();

    app.stage.addChild(faceLayer, vfxLayer, speechLayer);
    
    speechLayer.eventMode = 'none';

    let tex = {}, spr = {}, videoPool = [], poolIdx = 0, poppedCount = 0;
    let audio = { ctx: null, buffer: null, source: null };
    
    let currentDialogIdx = -1;
    let dialogTimeout = null;
    const introDialogs = [
        "Приветик! Я после войны с хохлами, ручек нету...",
        "Не могу справится сама с этими прыщами! Помоги!"
    ];

    async function init() {
        app.view.style.opacity = "0";
        
        const assets = {
            face: 'https://i.imgur.com/iJ8uD5c.png',
            body: 'https://i.imgur.com/zr0nAvr.png',
            mOpen: 'https://i.imgur.com/dQMJxii.png', mClose: 'https://i.imgur.com/V2fI7rT.png',
            eOpen: 'https://i.imgur.com/OyjLFjF.png', eClose: 'https://i.imgur.com/5JoI7cd.png',
            pimple: 'https://i.imgur.com/VX0GzMe.png', pPop: 'https://i.imgur.com/AN04txu.png'
        };
        
        for (let k in assets) tex[k] = await PIXI.Assets.load(assets[k]);
        
        tex.pPop = new PIXI.Texture(tex.pPop.baseTexture, new PIXI.Rectangle(3, 1, tex.pPop.width - 3, tex.pPop.height - 1));

        setupFace();
        await setupVideoAndAudio();
        setupUI();
        
        resize();
        window.addEventListener('resize', resize);
        
        app.view.style.opacity = "1";
        
        scheduleBlink();
        startIntro();
    }

    function startIntro() {
        app.stage.eventMode = 'static';
        app.stage.hitArea = app.screen;

        const handleNext = () => {
            if (dialogTimeout) clearTimeout(dialogTimeout);
            currentDialogIdx++;

            if (currentDialogIdx < introDialogs.length) {
                showSpeech(introDialogs[currentDialogIdx]);
                dialogTimeout = setTimeout(handleNext, 4500);
            } else {
                app.stage.off('pointerdown', handleNext);
                app.stage.hitArea = null; 
                app.stage.eventMode = 'passive';
                
                speechLayer.removeChildren();
                const ui = document.getElementById('ui-layer');
                ui.style.display = 'block';
                gsap.from(ui, { opacity: 0, y: 20, duration: 0.5 });
                for(let i=0; i<6; i++) spawn();
            }
        };

        app.stage.on('pointerdown', handleNext);
        handleNext();
    }

    function showSpeech(text) {
        speechLayer.removeChildren();
        const container = new PIXI.Container();
        const bubble = new PIXI.Graphics();
        bubble.beginFill(0xFFFFFF);
        bubble.lineStyle(4, 0x000000, 1);
        bubble.drawRoundedRect(-150, -50, 300, 100, 20);
        bubble.moveTo(0, 50);
        bubble.lineTo(20, 80);
        bubble.lineTo(40, 50);
        bubble.endFill();

        const style = new PIXI.TextStyle({
            fontFamily: 'Arial', fontSize: 20, fontWeight: 'bold',
            wordWrap: true, wordWrapWidth: 260, align: 'center'
        });
        const txt = new PIXI.Text(text, style);
        txt.anchor.set(0.5);
        container.addChild(bubble, txt);
        
        container.position.set(app.screen.width/2, app.screen.height/2 - 250);
        container.scale.set(0);
        speechLayer.addChild(container);

        gsap.to(container.scale, { x: 1, y: 1, duration: 0.3, ease: "back.out" });
    }

    function setupFace() {
        const createSpr = (t, x, y, s = 0.6) => {
            const sptr = new PIXI.Sprite(t);
            sptr.anchor.set(0.5); sptr.position.set(x, y); sptr.scale.set(s);
            return sptr;
        };

        spr.body = new PIXI.Sprite(tex.body);
        spr.body.anchor.set(0.5, 0); 
        spr.body.position.set(CONFIG.OFFSET_X, CONFIG.BODY_Y_FIXED);
        spr.body.scale.set(CONFIG.BODY_SCALE_H, CONFIG.BODY_SCALE_V);

        // Анимация дыхания
        gsap.to(spr.body.scale, {
            y: CONFIG.BODY_SCALE_V + 0.03,
            duration: 2.5,
            repeat: -1,
            yoyo: true,
            ease: "sine.inOut"
        });
        gsap.to(spr.body, {
            y: CONFIG.BODY_Y_FIXED - 1,
            duration: 2.5,
            repeat: -1,
            yoyo: true,
            ease: "sine.inOut"
        });

        spr.base = createSpr(tex.face, 0, 0, 1);
        spr.eLO = createSpr(tex.eOpen, -CONFIG.EYE_X + CONFIG.OFFSET_X, CONFIG.EYE_Y);
        spr.eRO = createSpr(tex.eOpen, CONFIG.EYE_X + CONFIG.OFFSET_X, CONFIG.EYE_Y);
        spr.eRO.scale.x *= -1;
        spr.eLC = createSpr(tex.eClose, spr.eLO.x, spr.eLO.y);
        spr.eRC = createSpr(tex.eClose, spr.eRO.x, spr.eRO.y);
        spr.eRC.scale.x *= -1;
        spr.mouth = createSpr(tex.mClose, CONFIG.OFFSET_X, CONFIG.MOUTH_Y, 0.6);

        [spr.eLC, spr.eRC].forEach(e => e.alpha = 0);
        faceLayer.addChild(spr.body, spr.base, spr.eLO, spr.eRO, spr.eLC, spr.eRC, spr.mouth, pimpleLayer);
    }

    function setFaceState(isPopping) {
        const a = isPopping ? 0 : 1;
        spr.eLO.alpha = spr.eRO.alpha = a;
        spr.eLC.alpha = spr.eRC.alpha = 1 - a;
        spr.mouth.texture = isPopping ? tex.mOpen : tex.mClose;
    }

    async function setupVideoAndAudio() {
        const res = await fetch(CONFIG.VIDEO_URL);
        const buf = await res.arrayBuffer();
        const url = URL.createObjectURL(new Blob([buf], { type: 'video/webm' }));
        audio.ctx = new (window.AudioContext || window.webkitAudioContext)();
        audio.buffer = await audio.ctx.decodeAudioData(buf.slice(0));

        const maskTex = PIXI.Texture.from(createGradientCanvas());
        
        const colorMatrix = new PIXI.ColorMatrixFilter();
        colorMatrix.brightness(1.3, false); 
        
        const filtersToApply = [colorMatrix];
        const ConvFilter = PIXI.filters.ConvolutionFilter || (window.PIXI && window.PIXI.filters && window.PIXI.filters.ConvolutionFilter);
        
        if (ConvFilter) {
            filtersToApply.push(new ConvFilter([0, -1, 0, -1, 7, -1, 0, -1, 0]));
        }

        for (let i = 0; i < 12; i++) {
            const v = document.createElement('video');
            v.src = url; v.muted = true; v.playsInline = true;
            const s = new PIXI.Sprite(new PIXI.Texture(PIXI.BaseTexture.from(v)));
            s.anchor.set(0.5, 0); s.scale.set(0.12); s.visible = false;
            
            s.filters = filtersToApply;
            
            const m = new PIXI.Sprite(maskTex);
            m.anchor.set(0.5, 0); s.mask = m;
            vfxLayer.addChild(s, m);
            videoPool.push({ v, s, m });
        }
    }

    function createGradientCanvas() {
        const c = document.createElement('canvas');
        c.width = 100; c.height = 200;
        const ctx = c.getContext('2d');
        const g = ctx.createLinearGradient(0, 0, 0, 200);
        g.addColorStop(0, 'transparent'); 
        g.addColorStop(0.4, 'white'); 
        g.addColorStop(0.6, 'white'); 
        g.addColorStop(1, 'transparent');
        ctx.fillStyle = g; ctx.fillRect(0, 0, 100, 200);
        return c;
    }

    function playPop(x, y) {
        const itm = videoPool[poolIdx];
        poolIdx = (poolIdx + 1) % videoPool.length;
        itm.s.position.set(x + 4 + (Math.random()-0.5)*5, y);
        itm.m.position.set(itm.s.x, itm.s.y);
        itm.m.width = itm.s.width; itm.m.height = itm.s.height;
        itm.s.visible = true; itm.v.currentTime = 0; itm.v.play();
        itm.v.onended = () => itm.s.visible = false;

        if (audio.ctx.state === 'suspended') audio.ctx.resume();
        if (audio.source) try { audio.source.stop(); } catch(e){}
        audio.source = audio.ctx.createBufferSource();
        audio.source.buffer = audio.buffer;
        audio.source.connect(audio.ctx.destination);
        audio.source.start(0);
    }

    function updateCounter() {
        poppedCount++;
        const el = document.getElementById('pimpleCount');
        el.innerText = poppedCount;
        gsap.fromTo(el, {scale: 1.5}, {scale: 1, duration: 0.3, ease: "back.out"});
    }

    function isValid(x, y) {
        if (y < CONFIG.LIMIT_Y_TOP || y > CONFIG.LIMIT_Y_BOT) return false;
        if (((x*x)/(CONFIG.ZONE_A**2) + ((y-135)**2)/(CONFIG.ZONE_B**2)) > 1) return false;
        const dL = (x - (spr.eLO.x))**2 + (y - spr.eLO.y)**2;
        const dR = (x - (spr.eRO.x))**2 + (y - spr.eRO.y)**2;
        if (dL < 12100 || dR < 12100) return false;
        if (Math.abs(x - CONFIG.OFFSET_X) < 50 && y > 90) return false;
        return !pimpleLayer.children.some(p => ((x-p.x)**2 + (y-p.y)**2) < 3025);
    }

    function spawn() {
        let x, y, ok = false, tries = 0;
        while (!ok && tries++ < 2000) {
            x = (Math.random()-0.5)*450; y = (Math.random()-0.5)*500+130;
            if (isValid(x, y)) ok = true;
        }
        if (ok) {
            const p = new PIXI.Sprite(tex.pimple);
            p.anchor.set(0.5); p.position.set(x, y); p.scale.set(0.4 + Math.random()*0.2);
            p.eventMode = 'static'; p.cursor = 'pointer';
            p.hitArea = new PIXI.Circle(0, 0, 80);

            p.on('pointerdown', (e) => {
                e.stopPropagation();
                p.eventMode = 'none';
                p.texture = tex.pPop;
                const gPos = p.toGlobal(new PIXI.Point(0,0));
                playPop(gPos.x, gPos.y);
                updateCounter();
                setFaceState(true);
                gsap.timeline()
                    .fromTo(faceLayer, {x: app.screen.width/2-3}, {x: app.screen.width/2+3, duration:0.04, repeat:3, yoyo:true})
                    .add(() => setFaceState(false), "+=0.15")
                    .add(() => p.destroy(), "+=0.5");
            });
            pimpleLayer.addChild(p);
            gsap.from(p.scale, {x:0, y:0, duration:0.2, ease:"back.out"});
        }
    }

    function scheduleBlink() {
        const nextBlink = 2000 + Math.random() * 3000;
        setTimeout(() => {
            blink();
            scheduleBlink();
        }, nextBlink);
    }

    function blink() {
        if (spr.eLO.alpha === 1 && !gsap.isTweening(faceLayer)) {
            setFaceState(true);
            setTimeout(() => setFaceState(false), 150);
        }
    }

    function setupUI() {
        document.getElementById('spawnBurstBtn').onclick = () => {
            pimpleLayer.removeChildren();
            for(let i=0; i<10; i++) spawn();
        };
    }

    function resize() {
        faceLayer.position.set(app.screen.width/2, app.screen.height/2 - 150);
        const s = Math.min(app.screen.width/600, app.screen.height/800)*0.85;
        faceLayer.scale.set(s);
        speechLayer.position.set(0, 0);
        if (currentDialogIdx < introDialogs.length) {
            app.stage.hitArea = app.screen;
        }
    }

    init();
</script>
</body>
</html>
